    <style>
        :root { --accent: #ff3e3e; --bg: #0a0a0a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 90%; max-width: 420px; padding: 40px 25px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; backdrop-filter: blur(20px); text-align: center; position: relative; }

        .signal-box { background: rgba(255, 62, 62, 0.1); border: 1px solid rgba(255, 62, 62, 0.3); border-radius: 15px; padding: 15px; margin-bottom: 30px; position: relative; }
        .live-tag { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ff3e3e; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: bold; }
        
        .btn { display: block; background: #ff3e3e; color: white; text-decoration: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; border: none; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 62, 62, 0.3); }
        .btn:hover { transform: translateY(-3px); }

        #notification-popup img { width: 25px; height: 25px; border-radius: 50%; }

    const popup = document.getElementById('notification-popup');
    const popupText = document.getElementById('popup-text');

    function showPopup() {
        const randomName = names[Math.floor(Math.random() * names.length)];
        popupText.innerText = randomName + " just joined the channel";
        popup.classList.add('show');
        
        setTimeout(() => {
            popup.classList.remove('show');
        }, 4000);

    // Har 8-10 seconds mein popup aayega
